<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级宠物养成系统 Pro</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入图标库，解决方块显示问题 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .pet-animate { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .bg-gradient-soft { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
    </style>
</head>
<body class="bg-gradient-soft min-h-screen font-sans">
    <div id="app" class="p-4 md:p-8">
        
        <!-- 界面 1：班级选择/管理 -->
        <div v-if="!currentClass" class="max-w-2xl mx-auto pt-10">
            <div class="bg-white rounded-3xl shadow-xl p-8 border border-white">
                <h1 class="text-3xl font-black text-slate-800 mb-6 flex items-center gap-3">
                    <i class="fas fa-school text-indigo-500"></i> 我的班级
                </h1>
                
                <div v-if="classes.length > 0" class="grid grid-cols-1 gap-4 mb-8">
                    <div v-for="(cls, index) in classes" :key="index" 
                         @click="selectClass(cls)"
                         class="group flex justify-between items-center p-5 bg-slate-50 border-2 border-transparent hover:border-indigo-500 rounded-2xl cursor-pointer transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600">
                                <i class="fas fa-users text-xl"></i>
                            </div>
                            <div>
                                <div class="font-bold text-lg">{{ cls.name }}</div>
                                <div class="text-sm text-slate-400">{{ cls.students.length }} 位同学</div>
                            </div>
                        </div>
                        <button @click.stop="deleteClass(index)" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 p-2">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>

                <div class="border-t pt-6">
                    <p class="text-sm text-slate-500 mb-3 font-bold">创建新班级</p>
                    <div class="flex gap-2">
                        <input v-model="newClassName" type="text" placeholder="例如：三年级二班" 
                               class="flex-1 px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                        <button @click="createClass" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                            创建班级
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 界面 2：班级内部管理 -->
        <div v-else>
            <!-- 导航栏 -->
            <header class="flex flex-wrap justify-between items-center mb-8 glass p-4 rounded-2xl shadow-sm border border-white">
                <div class="flex items-center gap-4">
                    <button @click="currentClass = null" class="text-slate-400 hover:text-indigo-600 p-2 transition">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div>
                        <h1 class="text-xl font-black text-slate-800">{{ currentClass.name }}</h1>
                        <p class="text-xs text-slate-400">当前共有 {{ currentClass.students.length }} 位学生</p>
                    </div>
                </div>
                
                <div class="flex gap-2 mt-4 md:mt-0">
                    <button @click="showAddStudent = true" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition">
                        <i class="fas fa-user-plus mr-1"></i> 批量录入
                    </button>
                    <button @click="batchFeeding" class="bg-amber-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-amber-200 hover:bg-amber-600 transition">
                        <i class="fas fa-cookie-bite mr-1"></i> 批量奖励
                    </button>
                    <button @click="showShop = true" class="bg-rose-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-rose-200 hover:bg-rose-600 transition">
                        <i class="fas fa-store mr-1"></i> 兑换中心
                    </button>
                </div>
            </header>

            <!-- 学生网格 -->
            <div v-if="currentClass.students.length === 0" class="text-center py-20 bg-white/50 rounded-3xl border-2 border-dashed border-slate-300">
                <i class="fas fa-user-graduate text-5xl text-slate-300 mb-4"></i>
                <p class="text-slate-500">班级还没有学生，请点击右上角录入名单</p>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                <div v-for="student in currentClass.students" :key="student.id" 
                     class="group bg-white rounded-3xl p-5 shadow-sm border border-slate-100 hover:shadow-xl transition-all relative overflow-hidden">
                    
                    <!-- 勋章数 -->
                    <div v-if="student.badges > 0" class="absolute top-3 left-3 flex items-center gap-1 bg-amber-100 text-amber-600 px-2 py-1 rounded-lg text-[10px] font-black">
                        <i class="fas fa-medal"></i> {{ student.badges }}
                    </div>

                    <!-- 宠物区域 -->
                    <div class="text-center mb-4 pt-4">
                        <div v-if="!student.petIcon" @click="adoptPet(student)" 
                             class="w-20 h-20 mx-auto bg-slate-100 rounded-full flex items-center justify-center cursor-pointer hover:bg-indigo-50 transition border-2 border-dashed border-indigo-200">
                            <div class="text-slate-400 text-xs text-center font-bold">点击领养<br>宠物</div>
                        </div>
                        <div v-else class="text-4xl h-20 flex items-center justify-center pet-animate" :style="{ color: student.petColor }">
                            <i :class="getPetIcon(student)"></i>
                        </div>
                        <h3 class="font-black text-slate-800 mt-2 truncate">{{ student.name }}</h3>
                        <div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">Level {{ student.level }}</div>
                    </div>

                    <!-- 进度条 -->
                    <div class="mb-4">
                        <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                            <div class="bg-indigo-500 h-full transition-all duration-500" 
                                 :style="{ width: (student.xp / (student.level * 10) * 100) + '%' }"></div>
                        </div>
                    </div>

                    <!-- 快捷加分 -->
                    <div class="flex gap-1">
                        <button @click="updateXp(student, 2)" class="flex-1 bg-green-500 text-white text-[10px] py-1.5 rounded-lg font-bold hover:bg-green-600 transition">+2</button>
                        <button @click="updateXp(student, -1)" class="flex-1 bg-slate-100 text-slate-400 text-[10px] py-1.5 rounded-lg font-bold hover:bg-red-500 hover:text-white transition">-1</button>
                    </div>

                    <!-- 删除学生 -->
                    <button @click="deleteStudent(student)" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 弹窗：批量录入 -->
        <div v-if="showAddStudent" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">
                <h2 class="text-2xl font-black mb-2 text-slate-800">批量录入名单</h2>
                <p class="text-sm text-slate-400 mb-4">您可以直接从 Excel 或 Word 复制姓名列表粘贴到下方。</p>
                <textarea v-model="newStudentNames" placeholder="张三&#10;李四&#10;王五..." 
                          class="w-full h-48 border-2 border-slate-100 rounded-2xl p-4 mb-6 focus:border-indigo-500 outline-none font-medium"></textarea>
                <div class="flex gap-3">
                    <button @click="addStudents" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-200">开始导入</button>
                    <button @click="showAddStudent = false" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black">取消</button>
                </div>
            </div>
        </div>

        <!-- 提示框 -->
        <div v-if="toast.show" class="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-3 rounded-full shadow-2xl z-[100] font-bold text-sm">
            <i class="fas fa-bell mr-2 text-amber-400"></i> {{ toast.msg }}
        </div>

    </div>

    <script>
        const { createApp, ref, onMounted, watch } = Vue;

        createApp({
            setup() {
                const classes = ref([]);
                const currentClass = ref(null);
                const newClassName = ref('');
                const showAddStudent = ref(false);
                const newStudentNames = ref('');
                const toast = ref({ show: false, msg: '' });

                // 可选宠物图标池
                const petIcons = ['fa-dog', 'fa-cat', 'fa-dragon', 'fa-fish', 'fa-otter', 'fa-hippo', 'fa-horse', 'fa-frog'];
                const petColors = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6'];

                onMounted(() => {
                    const saved = localStorage.getItem('class_pet_v2_data');
                    if (saved) classes.value = JSON.parse(saved);
                });

                watch(classes, (newVal) => {
                    localStorage.setItem('class_pet_v2_data', JSON.stringify(newVal));
                }, { deep: true });

                const createClass = () => {
                    if (!newClassName.value.trim()) return;
                    classes.value.push({
                        name: newClassName.value,
                        students: []
                    });
                    newClassName.value = '';
                    showToast('班级创建成功！');
                };

                const selectClass = (cls) => {
                    currentClass.value = cls;
                };

                const deleteClass = (index) => {
                    if (confirm('确定要删除这个班级吗？')) {
                        classes.value.splice(index, 1);
                    }
                };

                const addStudents = () => {
                    const names = newStudentNames.value.split(/[\s\n,，]+/).filter(n => n.trim());
                    names.forEach(name => {
                        currentClass.value.students.push({
                            id: Date.now() + Math.random(),
                            name: name,
                            level: 1,
                            xp: 0,
                            badges: 0,
                            petIcon: '', // 初始未领养
                            petColor: ''
                        });
                    });
                    newStudentNames.value = '';
                    showAddStudent.value = false;
                    showToast(`成功录入 ${names.length} 名学生`);
                };

                const adoptPet = (student) => {
                    student.petIcon = petIcons[Math.floor(Math.random() * petIcons.length)];
                    student.petColor = petColors[Math.floor(Math.random() * petColors.length)];
                    showToast(`${student.name} 领养了一个宠物！`);
                };

                const getPetIcon = (student) => {
                    // 根据等级提升决定图标形态 (这里简化为固定图标，实际可根据等级变)
                    return `fas ${student.petIcon}`;
                };

                const updateXp = (student, amount) => {
                    if (!student.petIcon) {
                        showToast('请先点击领养宠物！');
                        return;
                    }
                    student.xp += amount;
                    if (student.xp < 0) student.xp = 0;
                    
                    const threshold = student.level * 10;
                    if (student.xp >= threshold) {
                        if (student.level < 8) {
                            student.level++;
                            student.xp = 0;
                            showToast(`${student.name} 的宠物升级了！`);
                        } else {
                            student.badges++;
                            student.level = 1;
                            student.xp = 0;
                            showToast(`${student.name} 宠物毕业，获得 1 枚勋章！`);
                        }
                    }
                };

                const deleteStudent = (student) => {
                    if (confirm(`确定要从班级中删除 ${student.name} 吗？`)) {
                        const index = currentClass.value.students.indexOf(student);
                        currentClass.value.students.splice(index, 1);
                    }
                };

                const batchFeeding = () => {
                    currentClass.value.students.forEach(s => {
                        if (s.petIcon) updateXp(s, 2);
                    });
                    showToast('已为全班同学增加积分');
                };

                const showToast = (msg) => {
                    toast.value = { show: true, msg: msg };
                    setTimeout(() => toast.value.show = false, 3000);
                };

                return {
                    classes, currentClass, newClassName, showAddStudent, newStudentNames, toast,
                    createClass, selectClass, deleteClass, addStudents, adoptPet, getPetIcon, updateXp, deleteStudent, batchFeeding
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
