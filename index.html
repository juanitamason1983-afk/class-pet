<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级宠物养成 Pro - 纯写实版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .pet-photo { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); object-fit: cover; }
        .pet-card:hover .pet-photo { transform: scale(1.1); }
        .bg-gradient-soft { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); }
        /* 领养中心图片悬停 */
        .adopt-option:hover img { transform: scale(1.1); border-color: #6366f1; }
        .evolve-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }
    </style>
</head>
<body class="bg-gradient-soft min-h-screen font-sans">
    <div id="app" class="p-4 md:p-8">
        
        <!-- 界面 1：班级管理首页 -->
        <div v-if="!currentClass" class="max-w-2xl mx-auto pt-10">
            <div class="bg-white rounded-[2.5rem] shadow-2xl p-10 border border-white">
                <h1 class="text-3xl font-black text-slate-800 mb-8 flex items-center gap-3">
                    <span class="text-4xl">🏫</span> 班级宠物系统
                </h1>
                
                <div v-if="classes.length > 0" class="grid grid-cols-1 gap-4 mb-8">
                    <div v-for="(cls, index) in classes" :key="index" 
                         @click="selectClass(cls)"
                         class="group flex justify-between items-center p-6 bg-slate-50 border-2 border-transparent hover:border-indigo-400 rounded-3xl cursor-pointer transition-all">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                <i class="fas fa-layer-group text-2xl"></i>
                            </div>
                            <div>
                                <div class="font-black text-xl text-slate-700">{{ cls.name }}</div>
                                <div class="text-sm text-slate-400 font-bold">{{ cls.students.length }} 名学生</div>
                            </div>
                        </div>
                        <button @click.stop="deleteClass(index)" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 p-2 transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="border-t pt-8">
                    <p class="text-sm text-slate-400 mb-4 font-bold">创建新班级</p>
                    <div class="flex gap-3">
                        <input v-model="newClassName" type="text" placeholder="输入班级名称..." 
                               class="flex-1 px-6 py-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500 transition font-bold">
                        <button @click
