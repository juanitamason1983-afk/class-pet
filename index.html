<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级宠物养成 Pro - 稳定版</title>
    <!-- 使用国内加速镜像，防止加载失败 -->
    <script src="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/vue/3.2.31/vue.global.prod.min.js"></script>
    <script src="https://cdn.staticfile.org/tailwind-css/2.2.19/tailwind.min.js"></script>
    <link rel="stylesheet" href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/6.0.0/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .pet-photo { transition: all 0.4s ease; object-fit: cover; border-radius: 1.5rem; }
        .bg-gradient-soft { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); }
        .adopt-option:hover img { transform: scale(1.05); border-color: #4f46e5; }
    </style>
</head>
<body class="bg-gradient-soft min-h-screen font-sans text-slate-900">
    <!-- v-cloak 配合上面的样式可以防止源码闪烁 -->
    <div id="app" v-cloak class="p-4 md:p-8">
        
        <!-- 界面 1：班级管理首页 -->
        <div v-if="!currentClass" class="max-w-2xl mx-auto pt-10">
            <div class="bg-white rounded-[2.5rem] shadow-2xl p-10 border border-white">
                <h1 class="text-3xl font-black mb-8 flex items-center gap-3">
                    <span class="text-4xl">🏫</span> 班级宠物系统
                </h1>
                
                <!-- 已建班级列表 -->
                <div v-if="classes && classes.length > 0" class="grid grid-cols-1 gap-4 mb-8">
                    <div v-for="(cls, index) in classes" :key="index" 
                         @click="selectClass(cls)"
                         class="group flex justify-between items-center p-6 bg-slate-50 border-2 border-transparent hover:border-indigo-400 rounded-3xl cursor-pointer transition-all">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                <i class="fas fa-layer-group text-2xl"></i>
                            </div>
                            <div>
                                <div class="font-black text-xl text-slate-700">{{ cls.name }}</div>
                                <div class="text-sm text-slate-400 font-bold">{{ cls.students ? cls.students.length : 0 }} 名学生</div>
                            </div>
                        </div>
                        <button @click.stop="deleteClass(index)" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 p-2 transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>

                <!-- 创建新班级区域 -->
                <div class="border-t pt-8">
                    <p class="text-sm text-slate-400 mb-4 font-bold">创建新班级</p>
                    <div class="flex gap-3">
                        <input v-model="newClassName" 
                               @keyup.enter="createClass"
                               type="text" placeholder="输入班级名称（如：135班）" 
                               class="flex-1 px-6 py-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500 transition font-bold">
                        <button @click="createClass" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
                            创建
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 界面 2：班级工作台 -->
        <div v-else>
            <header class="flex flex-wrap justify-between items-center mb-10 glass p-5 rounded-[2.5rem] shadow-sm border border-white">
                <div class="flex items-center gap-5">
                    <button @click="currentClass = null" class="w-12 h-12 flex items-center justify-center bg-white rounded-2xl text-slate-400 hover:text-indigo-600 border border-slate-50 shadow-sm transition">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div>
                        <h1 class="text-2xl font-black text-slate-800">{{ currentClass.name }}</h1>
                        <p class="text-xs text-indigo-500 font-black uppercase tracking-widest">Real Pet Workbench</p>
                    </div>
                </div>
                
                <div class="flex gap-3 mt-4 md:mt-0">
                    <button @click="showAddStudent = true" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl text-sm font-black shadow-lg">
                        <i class="fas fa-user-plus mr-2"></i>批量录入
                    </button>
                    <button @click="batchFeeding" class="bg-amber-500 text-white px-6 py-3 rounded-2xl text-sm font-black shadow-lg">
                        <i class="fas fa-bolt mr-2"></i>一键加分
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-8">
                <div v-for="student in currentClass.students" :key="student.id" 
                     class="group bg-white rounded-[2.5rem] p-5 shadow-xl shadow-slate-200/40 border border-white transition-all relative overflow-hidden">
                    
                    <div v-if="student.badges > 0" class="absolute -top-1 -right-1 bg-amber-500 text-white w-9 h-9 rounded-2xl flex items-center justify-center shadow-lg border-2 border-white z-10">
                        <i class="fas fa-medal"></i>
                    </div>

                    <div class="text-center mb-4">
                        <div v-if="!student.petImg" @click="openAdoptModal(student)" 
                             class="w-full aspect-square bg-slate-50 rounded-[2rem] flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-50 border-4 border-dashed border-slate-100 transition-all overflow-hidden">
                            <i class="fas fa-plus text-slate-200 text-3xl mb-1"></i>
                            <span class="text-indigo-400 font-black text-[10px]">选择宠物</span>
                        </div>
                        <div v-else class="w-full aspect-square rounded-[2rem] overflow-hidden cursor-pointer shadow-inner" @click="openAdoptModal(student)">
                            <img :src="student.petImg" class="pet-photo w-full h-full">
                        </div>
                        <h3 class="font-black text-slate-800 text-lg mt-4">{{ student.name }}</h3>
                        <div class="text-indigo-500 font-black text-[10px]">LV.{{ student.level }}</div>
                    </div>

                    <div class="mb-5 px-1">
                        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden p-[1px]">
                            <div class="bg-indigo-600 h-full rounded-full transition-all duration-700" 
                                 :style="{ width: (student.xp / (student.level * 10) * 100) + '%' }"></div>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button @click="updateXp(student, 2)" class="flex-[2] bg-indigo-600 text-white text-[10px] py-3 rounded-2xl font-black shadow-md shadow-indigo-100">+2</button>
                        <button @click="updateXp(student, -1)" class="flex-1 bg-slate-100 text-slate-400 text-[10px] py-3 rounded-2xl font-black">-1</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 领养中心弹窗 -->
        <div v-if="showAdoptModal" class="fixed inset-0 bg-slate-900/90 flex items-center justify-center p-4 z-[100] backdrop-blur-md">
            <div class="bg-white rounded-[3rem] p-10 w-full max-w-4xl shadow-2xl relative">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-black text-slate-800
