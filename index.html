<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级宠物养成系统 - 稳定增强版</title>
    
    <!-- 使用国内最稳定的 Staticfile 镜像 (七牛云提供) -->
    <script src="https://cdn.staticfile.org/vue/3.2.31/vue.global.prod.min.js"></script>
    <script src="https://cdn.staticfile.org/tailwind-css/2.2.19/tailwind.min.js"></script>
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background: #f1f5f9; margin: 0; font-family: sans-serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .pet-photo { object-fit: cover; border-radius: 1.5rem; width: 100%; height: 100%; }
        /* 避免白屏：如果Vue还没加载，显示这个 */
        #loading-hint { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: white; z-index: 9999; }
    </style>
</head>
<body>

    <!-- 加载提示：Vue启动后会自动消失 -->
    <div id="loading-hint">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #4f46e5;"></i>
            <p style="margin-top: 10px; font-weight: bold; color: #64748b;">系统启动中，请稍候...</p>
        </div>
    </div>

    <div id="app" class="p-4 md:p-8" style="display: none;" :style="{ display: 'block' }">
        
        <!-- 界面 1：班级选择 -->
        <div v-if="!currentClass" class="max-w-xl mx-auto mt-10">
            <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
                <h1 class="text-2xl font-bold mb-6 text-gray-800"><i class="fas fa-home text-indigo-500 mr-2"></i>我的班级</h1>
                
                <div v-if="classes.length > 0" class="space-y-3 mb-8">
                    <div v-for="(cls, index) in classes" :key="index" 
                         @click="selectClass(cls)"
                         class="flex justify-between items-center p-5 bg-gray-50 hover:bg-indigo-50 rounded-2xl cursor-pointer transition-all border border-transparent hover:border-indigo-200">
                        <div class="flex items-center gap-4">
                            <i class="fas fa-users text-indigo-400"></i>
                            <span class="font-bold text-gray-700">{{ cls.name }}</span>
                        </div>
                        <button @click.stop="deleteClass(index)" class="text-gray-300 hover:text-red-500 p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="pt-6 border-t">
                    <p class="text-sm text-gray-400 mb-3 font-bold">新建班级</p>
                    <div class="flex gap-2">
                        <input v-model="newClassName" @keyup.enter="createClass" type="text" placeholder="输入班级名" 
                               class="flex-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <button @click="createClass" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700">创建</butt
