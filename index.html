<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级宠物养成 Pro - 真实图库版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .pet-img { transition: transform 0.3s ease; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .pet-card:hover .pet-img { transform: scale(1.1) translateY(-5px); }
        .bg-gradient-soft { background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); }
        /* 领养中心图片悬停效果 */
        .adopt-option:hover img { transform: scale(1.15); }
    </style>
</head>
<body class="bg-gradient-soft min-h-screen font-sans">
    <div id="app" class="p-4 md:p-8">
        
        <!-- 界面 1：班级管理首页 -->
        <div v-if="!currentClass" class="max-w-2xl mx-auto pt-10">
            <div class="bg-white rounded-[2rem] shadow-2xl p-10 border border-white">
                <h1 class="text-3xl font-black text-slate-800 mb-8 flex items-center gap-3">
                    <span class="text-4xl">🏠</span> 我的宠物班级
                </h1>
                
                <div v-if="classes.length > 0" class="grid grid-cols-1 gap-4 mb-8">
                    <div v-for="(cls, index) in classes" :key="index" 
                         @click="selectClass(cls)"
                         class="group flex justify-between items-center p-6 bg-slate-50 border-2 border-transparent hover:border-indigo-400 rounded-3xl cursor-pointer transition-all">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-indigo-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                                <i class="fas fa-graduation-cap text-2xl"></i>
                            </div>
                            <div>
                                <div class="font-black text-xl text-slate-700">{{ cls.name }}</div>
                                <div class="text-sm text-slate-400 font-bold">{{ cls.students.length }} 位学生</div>
                            </div>
                        </div>
                        <button @click.stop="deleteClass(index)" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 p-2 transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="border-t pt-8">
                    <p class="text-sm text-slate-400 mb-4 font-bold">创建新班级</p>
                    <div class="flex gap-3">
                        <input v-model="newClassName" type="text" placeholder="例如：102班 快乐班" 
                               class="flex-1 px-6 py-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500 transition font-bold">
                        <button @click="createClass" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                            创建
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 界面 2：班级内部工作台 -->
        <div v-else>
            <!-- 导航 -->
            <header class="flex flex-wrap justify-between items-center mb-10 glass p-5 rounded-[2rem] shadow-sm border border-white">
                <div class="flex items-center gap-5">
                    <button @click="currentClass = null" class="w-10 h-10 flex items-center justify-center bg-white rounded-full text-slate-400 hover:text-indigo-600 shadow-sm transition">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div>
                        <h1 class="text-2xl font-black text-slate-800">{{ currentClass.name }}</h1>
                        <p class="text-xs text-indigo-500 font-black tracking-widest uppercase">Pet Management Hub</p>
                    </div>
                </div>
                
                <div class="flex gap-3 mt-4 md:mt-0">
                    <button @click="showAddStudent = true" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl text-sm font-black shadow-lg shadow-indigo-200 hover:scale-105 transition">
                        <i class="fas fa-plus-circle mr-2"></i>批量录入
                    </button>
                    <button @click="batchFeeding" class="bg-amber-500 text-white px-6 py-3 rounded-2xl text-sm font-black shadow-lg shadow-amber-200 hover:scale-105 transition">
                        <i class="fas fa-star mr-2"></i>批量奖励
                    </button>
                </div>
            </header>

            <!-- 学生列表 -->
            <div v-if="currentClass.students.length === 0" class="text-center py-24 bg-white/40 rounded-[3rem] border-4 border-dashed border-white">
                <div class="text-6xl mb-6">🐣</div>
                <p class="text-slate-500 font-bold text-lg">点击右上角按钮，录入学生名单开始吧！</p>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-8">
                <div v-for="student in currentClass.students" :key="student.id" 
                     class="pet-card group bg-white rounded-[2.5rem] p-6 shadow-xl shadow-slate-200/50 border border-white hover:shadow-2xl transition-all relative">
                    
                    <!-- 勋章标识 -->
                    <div v-if="student.badges > 0" class="absolute -top-2 -right-2 bg-gradient-to-br from-amber-300 to-orange-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg border-4 border-white z-10">
                        <i class="fas fa-medal"></i>
                    </div>

                    <!-- 宠物图片展示 -->
                    <div class="text-center mb-4">
                        <div v-if="!student.petImg" @click="openAdoptModal(student)" 
                             class="w-24 h-24 mx-auto bg-slate-50 rounded-full flex items-center justify-center cursor-pointer hover:bg-indigo-50 transition border-4 border-dashed border-slate-100 group-hover:border-indigo-200">
                            <span class="text-indigo-400 font-black text-xs leading-tight">点击<br>领养</span>
                        </div>
                        <div v-else class="h-28 flex items-center justify-center cursor-pointer" @click="openAdoptModal(student)">
                            <img :src="student.petImg" class="pet-img h-full object-contain pointer-events-none">
                        </div>
                        <h3 class="font-black text-slate-800 text-lg mt-3">{{ student.name }}</h3>
                        <div class="inline-block bg-slate-100 px-3 py-1 rounded-full text-[10px] font-black text-slate-400 uppercase tracking-tighter">LV.{{ student.level }}</div>
                    </div>

                    <!-- 经验进度条 -->
                    <div class="mb-5 px-2">
                        <div class="w-full bg-slate-100 rounded-full h-2 shadow-inner overflow-hidden">
                            <div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full transition-all duration-700 ease-out" 
                                 :style="{ width: (student.xp / (student.level * 10) * 100) + '%' }"></div>
                        </div>
                    </div>

                    <!-- 评分按钮 -->
                    <div class="flex gap-2">
                        <button @click="updateXp(student, 2)" class="flex-1 bg-green-500 text-white text-xs py-2.5 rounded-2xl font-black shadow-lg shadow-green-100 active:scale-95 transition">+2</button>
                        <button @click="updateXp(student, -1)" class="flex-1 bg-slate-100 text-slate-400 text-xs py-2.5 rounded-2xl font-black hover:bg-red-50 hover:text-red-500 active:scale-95 transition">-1</button>
                    </div>

                    <!-- 单独删除学生 -->
                    <button @click="deleteStudent(student)" class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-slate-200 hover:text-red-500 transition">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 弹窗：领养中心 (选择真实宠物图片) -->
        <div v-if="showAdoptModal" class="fixed inset-0 bg-slate-900/90 flex items-center justify-center p-4 z-[100] backdrop-blur-md">
            <div class="bg-white rounded-[3rem] p-10 w-full max-w-3xl shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
                
                <div class="text-center mb-10">
                    <h2 class="text-4xl font-black text-slate-800">🐾 领养中心</h2>
                    <p class="text-indigo-500 font-bold mt-2">为 <span class="text-slate-900 underline text-lg">{{ selectingStudent.name }}</span> 选择一个写实风格的小伙伴</p>
                </div>
                
                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-6 mb-10">
                    <div v-for="pet in petLib" :key="pet.name" 
                         @click="confirmAdoption(pet.img)"
                         class="adopt-option group flex flex-col items-center justify-center p-3 rounded-[2rem] border-4 border-transparent hover:border-indigo-500 hover:bg-indigo-50 cursor-pointer transition-all">
                        <img :src="pet.img" class="w-16 h-16 object-contain mb-2 transition-transform duration-300">
                        <span class="text-[10px] font-black text-slate-400 group-hover:text-indigo-600 uppercase">{{ pet.name }}</span>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button @click="showAdoptModal = false" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black hover:bg-slate-200 transition">
                        关闭
                    </button>
                </div>
            </div>
        </div>

        <!-- 弹窗：批量录入 -->
        <div v-if="showAddStudent" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-lg shadow-2xl">
                <h2 class="text-2xl font-black mb-6 text-slate-800 flex items-center gap-2">
                    <i class="fas fa-users-cog text-indigo-500"></i> 录入学生名单
                </h2>
                <textarea v-model="newStudentNames" placeholder="粘贴姓名列表，每行一个名字..." 
                          class="w-full h-56 border-2 border-slate-100 rounded-3xl p-6 mb-8 focus:border-indigo-500 outline-none font-bold text-slate-600 resize-none"></textarea>
                <div class="flex gap-4">
                    <button @click="addStudents" class="flex-1 bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition">确认导入</button>
                    <button @click="showAddStudent = false" class="flex-1 bg-slate-100 text-slate-400 py-5 rounded-[1.5rem] font-black">取消</button>
                </div>
            </div>
        </div>

        <!-- 全局吐司提示 -->
        <div v-if="toast.show" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800/90 text-white px-10 py-4 rounded-full shadow-2xl z-[200] font-black text-sm backdrop-blur-sm border border-slate-700 animate-bounce">
            ✨ {{ toast.msg }}
        </div>

    </div>

    <script>
        const { createApp, ref, onMounted, watch } = Vue;

        createApp({
            setup() {
                const classes = ref([]);
                const currentClass = ref(null);
                const newClassName = ref('');
                const showAddStudent = ref(false);
                const showAdoptModal = ref(false);
                const selectingStudent = ref(null);
                const newStudentNames = ref('');
                const toast = ref({ show: false, msg: '' });

                // 真实宠物图库 (使用公开的高清PNG链接)
                const petLib = [
                    { name: '金毛犬', img: 'https://cdn-icons-png.flaticon.com/512/616/616408.png' },
                    { name: '布偶猫', img: 'https://cdn-icons-png.flaticon.com/512/616/616430.png' },
                    { name: '小兔子', img: 'https://cdn-icons-png.flaticon.com/512/616/616444.png' },
                    { name: '仓鼠', img: 'https://cdn-icons-png.flaticon.com/512/3521/3521151.png' },
                    { name: '鹦鹉', img: 'https://cdn-icons-png.flaticon.com/512/3521/3521133.png' },
                    { name: '小乌龟', img: 'https://cdn-icons-png.flaticon.com/512/3521/3521124.png' },
                    { name: '柴犬', img: 'https://cdn-icons-png.flaticon.com/512/1998/1998627.png' },
                    { name: '小熊猫', img: 'https://cdn-icons-png.flaticon.com/512/2311/2311394.png' },
                    { name: '梅花鹿', img: 'https://cdn-icons-png.flaticon.com/512/2311/2311391.png' },
                    { name: '柯基犬', img: 'https://cdn-icons-png.flaticon.com/512/2311/2311384.png' },
                    { name: '小老虎', img: 'https://cdn-icons-png.flaticon.com/512/1998/1998614.png' },
                    { name: '小狐狸', img: 'https://cdn-icons-png.flaticon.com/512/1998/1998592.png' }
                ];

                onMounted(() => {
                    const saved = localStorage.getItem('class_pet_v4_data');
                    if (saved) classes.value = JSON.parse(saved);
                });

                watch(classes, (newVal) => {
                    localStorage.setItem('class_pet_v4_data', JSON.stringify(newVal));
                }, { deep: true });

                const createClass = () => {
                    if (!newClassName.value.trim()) return;
                    classes.value.push({ name: newClassName.value, students: [] });
                    newClassName.value = '';
                    showToast('班级创建成功！');
                };

                const selectClass = (cls) => currentClass.value = cls;
                
                const deleteClass = (index) => {
                    if (confirm('确定要删除这个班级吗？相关数据会全部清除。')) classes.value.splice(index, 1);
                };

                const addStudents = () => {
                    const names = newStudentNames.value.split(/[\s\n,，]+/).filter(n => n.trim());
                    names.forEach(name => {
                        currentClass.value.students.push({
                            id: Date.now() + Math.random(),
                            name: name,
                            level: 1, xp: 0, badges: 0, petImg: ''
                        });
                    });
                    newStudentNames.value = '';
                    showAddStudent.value = false;
                    showToast(`成功录入 ${names.length} 名学生`);
                };

                const openAdoptModal = (student) => {
                    selectingStudent.value = student;
                    showAdoptModal.value = true;
                };

                const confirmAdoption = (imgUrl) => {
                    if (selectingStudent.value) {
                        selectingStudent.value.petImg = imgUrl;
                        showAdoptModal.value = false;
                        showToast(`${selectingStudent.value.name} 领养成功！`);
                    }
                };

                const updateXp = (student, amount) => {
                    if (!student.petImg) return showToast('先领养宠物才能获得积分哦！');
                    student.xp += amount;
                    if (student.xp < 0) student.xp = 0;
                    
                    const threshold = student.level * 10;
                    if (student.xp >= threshold) {
                        student.level++;
                        student.xp = 0;
                        if (student.level % 5 === 0) { // 每5级奖励一个勋章
                            student.badges++;
                            showToast(`${student.name} 升到了第 ${student.level} 级，获得勋章！`);
                        } else {
                            showToast(`${student.name} 的宠物升级了！`);
                        }
                    }
                };

                const deleteStudent = (student) => {
                    if (confirm(`确定要从班级中移除 ${student.name} 吗？`)) {
                        const index = currentClass.value.students.indexOf(student);
                        currentClass.value.students.splice(index, 1);
                    }
                };

                const batchFeeding = () => {
                    currentClass.value.students.forEach(s => { if (s.petImg) updateXp(s, 1); });
                    showToast('给全班同学的奖励已发放！');
                };

                const showToast = (msg) => {
                    toast.value = { show: true, msg: msg };
                    setTimeout(() => toast.value.show = false, 3000);
                };

                return {
                    classes, currentClass, newClassName, showAddStudent, showAdoptModal, 
                    selectingStudent, newStudentNames, toast, petLib,
                    createClass, selectClass, deleteClass, addStudents, 
                    openAdoptModal, confirmAdoption, updateXp, deleteStudent, batchFeeding
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
